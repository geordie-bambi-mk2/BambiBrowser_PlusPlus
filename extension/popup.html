<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #120812;
      color: #eec8ee;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: linear-gradient(135deg, #3d0a3d, #5a1060);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #6d1f83;
    }
    .title {
      font-size: 1rem;
      font-weight: 700;
      color: #ffb7ff;
      letter-spacing: 0.6px;
    }
    .version {
      margin-left: auto;
      font-size: 0.68rem;
      color: #bb7fc9;
    }
    .icon-btn {
      width: 24px;
      height: 24px;
      border: 1px solid #6f2b84;
      border-radius: 6px;
      background: #2a0a35;
      color: #f0b8ff;
      font-size: 0.9rem;
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .icon-btn:hover { background: #4a0a60; }
    .content {
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .status-card {
      background: #160a18;
      border: 1px solid #3a143f;
      border-radius: 8px;
      padding: 9px 10px;
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.8rem;
    }
    .status-label {
      color: #b884c5;
    }
    .status-value {
      color: #f0c8ff;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 65%;
      text-align: right;
    }
    .status-value.good { color: #7ee07e; }
    .status-value.bad { color: #ff8a8a; }
    .playback-line {
      margin-top: 7px;
      font-size: 0.72rem;
      color: #9f73b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 1em;
    }
    .progress {
      margin-top: 7px;
      height: 6px;
      width: 100%;
      background: rgba(255, 155, 255, 0.16);
      border: 1px solid rgba(255, 155, 255, 0.3);
      border-radius: 999px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .progress.active { opacity: 1; }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #c55ad6, #ff9bff);
    }
    .footer {
      padding: 0 12px 10px;
      font-size: 0.68rem;
      color: #775086;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">BambiBrowser+ Status</span>
    <span class="version" id="headerVersion">v6.1</span>
    <button class="icon-btn" id="openSettingsBtn" title="Open full settings">⚙</button>
  </div>

  <div class="content">
    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Helper</span>
        <span class="status-value" id="helperStatus">Checking...</span>
      </div>
      <div class="status-row" style="margin-top:7px">
        <span class="status-label">Multi-monitor</span>
        <span class="status-value" id="multiMonitorStatus">Loading...</span>
      </div>
      <div class="status-row" style="margin-top:7px">
        <span class="status-label">Input lock</span>
        <span class="status-value" id="inputLockStatus">Loading...</span>
      </div>
    </div>

    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Playback</span>
        <span class="status-value" id="playbackStatus">Idle</span>
      </div>
      <div class="playback-line" id="playbackTime"></div>
      <div class="progress" id="playbackProgress" role="progressbar" aria-label="Playback progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div class="progress-fill" id="playbackProgressFill"></div>
      </div>
    </div>
  </div>

  <div class="footer">Click the cog for the full settings editor in a tab.</div>
  <script src="popup.js"></script>
</body>
</html>
