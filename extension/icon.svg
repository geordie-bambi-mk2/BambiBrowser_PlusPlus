  <ellipse cx="40" cy="36" rx="5"  ry="17" fill="#ee66ff" transform="rotate(-14 40 36)"/>
  <!-- right ear -->
  <ellipse cx="88" cy="36" rx="11" ry="27" fill="#9922aa" transform="rotate(14 88 36)"/>
  <ellipse cx="88" cy="36" rx="5"  ry="17" fill="#ee66ff" transform="rotate(14 88 36)"/>
  <!-- head -->
  <circle cx="64" cy="83" r="31" fill="#9922aa"/>
  <circle cx="64" cy="83" r="27" fill="#bb44cc"/>
  <!-- eyes -->
