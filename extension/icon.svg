  <circle cx="76" cy="77" r="5" fill="#1e0022"/>
  <!-- nose -->
  <ellipse cx="64" cy="91" rx="5" ry="4" fill="#ff99ff"/>
  <!-- + badge -->
  <circle cx="104" cy="22" r="14" fill="#ee66ff"/>
